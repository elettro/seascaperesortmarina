<!DOCTYPE html>
<html lang="en">
<head>

  <style>
    body {
      margin: 0;

      place-items: center;

      font-family: Arial, Helvetica, sans-serif;
      color: #0f2f46;
      background: #f7fbfc;

    }

    main {
      width: min(100%, 560px);

    a {
      display: inline-flex;

      align-items: center;

      background: #0f2f46;

<body>
  <main>
